{% extends "crm/base_crm.html" %}
{% block title %}{{ 'Edit' if lead else 'New' }} Lead - CRM{% endblock %}
{% block crm_content %}
<div class="section-header">
    <h2>{{ 'Edit' if lead else 'New' }} Lead</h2>
    <a href="{{ url_for('crm.leads') }}" class="btn btn-outline">Back to Leads</a>
</div>

<div class="card" style="max-width:700px">
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label>Lead Title *</label>
                <input type="text" name="title" class="form-control" required value="{{ lead.title if lead else '' }}" placeholder="e.g. Enterprise Software Deal">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Contact</label>
                    <select name="contact_id" class="form-control">
                        <option value="">-- Select Contact --</option>
                        {% for c in contacts %}
                            <option value="{{ c.id }}" {% if lead and lead.contact_id == c.id %}selected{% endif %}>{{ c.first_name }} {{ c.last_name or '' }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Value (&pound;)</label>
                    <input type="number" name="value" class="form-control" step="0.01" value="{{ lead.value if lead else '0' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Stage</label>
                    <select name="stage" class="form-control">
                        {% for s in ['new', 'qualified', 'proposal', 'negotiation', 'won', 'lost'] %}
                            <option value="{{ s }}" {% if lead and lead.stage == s %}selected{% endif %}>{{ s|title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Probability (%)</label>
                    <input type="number" name="probability" class="form-control" min="0" max="100" value="{{ lead.probability if lead else '10' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Expected Close Date</label>
                <input type="date" name="expected_close" class="form-control" value="{{ lead.expected_close.strftime('%Y-%m-%d') if lead and lead.expected_close else '' }}">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control">{{ lead.description if lead else '' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ 'Update' if lead else 'Create' }} Lead</button>
                <a href="{{ url_for('crm.leads') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
