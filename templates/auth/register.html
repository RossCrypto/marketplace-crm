{% extends "base.html" %}
{% block title %}Register - MarketHub{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card card" style="max-width:480px">
        <div class="card-body">
            <h2>Create Account</h2>
            <form method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="Choose a password">
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select name="role" class="form-control">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Create Account</button>
            </form>
            <p class="text-center mt-2">
                Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
